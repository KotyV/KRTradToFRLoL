name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build (warnings = erreurs)
        run: dotnet build KRTradToFRLoL.slnx -c Release

      - name: Tests
        run: dotnet test KRTradToFRLoL.slnx -c Release --no-build -v minimal
